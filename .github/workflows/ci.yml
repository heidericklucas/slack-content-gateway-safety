name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.7,<1.0"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run mypy
        run: mypy app

  test:
    name: Tests (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies (no torch/sentence-transformers — tests run with embeddings disabled)
        run: |
          pip install --upgrade pip
          pip install \
            "fastapi>=0.115,<1.0" \
            "uvicorn[standard]>=0.30,<1.0" \
            "slack-bolt>=1.21,<2.0" \
            "slack-sdk>=3.34,<4.0" \
            "aiohttp>=3.9,<4.0" \
            "openai>=1.50,<2.0" \
            "pydantic>=2.9,<3.0" \
            "pydantic-settings>=2.5,<3.0" \
            "structlog>=24.4,<26.0" \
            "tenacity>=9.0,<10.0" \
            "python-dotenv>=1.0,<2.0" \
            "pytest>=8.3,<9.0" \
            "pytest-asyncio>=0.24,<2.0" \
            "pytest-cov>=5.0,<7.0" \
            "httpx>=0.28,<1.0"
      - name: Run pytest with coverage
        env:
          EMBEDDING_ENABLED: "false"
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: slack-content-gateway:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
