apiVersion: v1
kind: Service
metadata:
  name: slack-content-gateway
  labels:
    app.kubernetes.io/name: slack-content-gateway
spec:
  # ClusterIP is the default for production; Minikube users can patch to
  # NodePort/LoadBalancer locally via `kubectl patch svc … -p '{"spec":{"type":"NodePort"}}'`.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: slack-content-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
