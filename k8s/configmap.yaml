apiVersion: v1
kind: ConfigMap
metadata:
  name: slack-content-gateway-config
  labels:
    app.kubernetes.io/name: slack-content-gateway
data:
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  OPENAI_MODEL: "gpt-4o"
  OPENAI_TIMEOUT_SECONDS: "15"
  EMBEDDING_MODEL: "sentence-transformers/paraphrase-MiniLM-L6-v2"
  EMBEDDING_ENABLED: "true"
  CONTEXT_MESSAGE_LIMIT: "20"
  MAX_RETRY_ATTEMPTS: "2"
  THRESHOLD_AGGRESSION: "0.5"
  THRESHOLD_HARASSMENT: "0.5"
  THRESHOLD_THREAT: "0.5"
  THRESHOLD_COERCIVE_AUTHORITY: "0.5"
  THRESHOLD_CONDESCENSION: "0.3"
  THRESHOLD_THREAT_SIMILARITY: "0.72"
